exec-once = bash /home/jktech/.config/hypr/autostart.sh
exec-once = bash /home/jktech/.config/hypr/gtk.sh
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = hyprpaper # wallpaper but for factional scaling
exec-once = hypridle

exec-once = waybar # Status bar
exec-once = hyprland-autoname-workspaces
exec-once = dunst # notification
exec-once = /usr/lib/pam_kwallet_init # Kwallet
exec-once = systemctl --user start hyprpolkitagent

exec-once = pulseAudio -C
exec-once = clash-verge
exec-once = fcitx5 -d

#Clipboard manager
exec-once = wl-paste --type text --watch cliphist store #Stores only text data
exec-once = wl-paste --type image --watch cliphist store #Stores only image data
exec-once = nm-applet --indicator

